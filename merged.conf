# Google中国跳转
# 把 google.cn(中国版，会跳转到百度) 重定向到 google.com(国际版)
# 这样在Safari地址栏输入google.cn也能正常访问Google搜索
^https?:\/\/(www.)?(g|google)\.cn url 302 https://www.google.com


# =====================================
# [task_local] 定时任务
# =====================================
# 定时任务分两种：
# 1. event-interaction = 交互式查询工具(长按节点/策略组触发)
# 2. cron = 定时自动执行(签到、同步等)
#
# cron格式：分 时 日 月 周
# 例如：5 0 * * * = 每天0:05执行
#
# enabled=true = 启用 / enabled=false = 禁用
# 大部分签到任务需要先获取Cookie才能用，默认关闭
# =====================================
[task_local]

# ==========================================
# UI交互查询工具(长按节点/策略组触发)
# ==========================================

# 流媒体解锁查询 - 检测当前节点能解锁哪些流媒体(Netflix/YouTube/Disney+等)
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/streaming-ui-check.js, tag=流媒体解锁查询, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Siri.png, enabled=true

# 地理位置查询 - 显示当前节点的IP、城市、运营商等详细信息
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/geo_location.js, tag=地理位置查询, img-url=location.fill.viewfinder.system, enabled=true

# 谷歌送中查询 - 检测当前节点是否被Google标记为中国IP(可能导致Google服务异常)
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/switch-check-google.js, tag=谷歌送中查询, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google.png, enabled=true

# 策略流量查询 - 查看各策略组/节点的流量使用情况
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/traffic-check.js, tag=策略流量查询, img-url=arrow.up.arrow.down.circle.system, enabled=true

# 节点速度测试 - 测试当前节点的上传/下载速度
event-interaction https://raw.githubusercontent.com/getsomecat/Qx/main/Net_Speed.js, tag=节点速度测试, img-url=bolt.square.fill.system, enabled=true

# 节点信息查询 - 显示节点的详细信息(协议、端口、加密方式等)
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/server-info-plus.js, tag=节点信息查询, img-url=tag.circle.system, enabled=true

# 代理链路检测 - 检测代理链路是否正常(从你的设备到目标网站的完整路径)
