# # ============================================
# # Quantumult X 综合配置 - 功能最全版
# # 合并自多个配置文件，适合日常使用
# # 生成时间：2026-06-25
# # ============================================
# #
# # 使用说明：
# # 1. 导入此配置文件到Quantumult X
# # 2. 在[server_remote]部分添加你的机场订阅链接
# # 3. 生成并安装证书(如果证书已安装则跳过)
# # 4. 开启代理即可使用
# #
# # 文件结构：
# # [general]     → 通用设置(测试链接、超时、解析器等)
# # [dns]         → DNS服务器配置(域名解析)
# # [policy]      → 策略组(决定流量走哪个节点/直连/拒绝)
# # [server_remote] → 远程机场订阅(添加你的节点)
# # [filter_remote] → 远程分流规则(哪些域名走代理/直连/拒绝)
# # [rewrite_remote] → 远程重写规则(去广告、解锁、功能增强)
# # [server_local]  → 本地节点(手动添加的单个节点)
# # [filter_local]  → 本地分流(局域网直连、中国IP直连等)
# # [rewrite_local] → 本地重写(Google跳转等)
# # [task_local]    → 定时任务(签到、查询工具等)
# # [http_backend]  → 后端服务(BoxJS等)
# # [mitm]        → 中间人证书(解密HTTPS流量用)
# # ============================================


# =====================================
# [general] 通用设置
# =====================================
# 这里配置QX的基础参数，一般不需要修改
# =====================================
[general]

# 节点延迟测试链接
# QX用这个网址测试节点速度，返回HTTP 204表示节点可用
# 可选：http://cp.cloudflare.com/generate_204 (Cloudflare) 或 http://www.google.com/generate_204 (Google)
server_check_url=http://www.google.com/generate_204

# 网络连通性测试链接
# QX用这个网址检测你的网络是否正常连接
network_check_url=http://www.bing.com

# 节点测试超时时间(毫秒)
# 如果节点响应超过3秒就认为不可用，建议2000-3000
server_check_timeout=3000

# 配置文件图标
# 显示在QX主界面风车菜单旁边的图标
profile_img_url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Quantumult_X.png

# 节点地理位置检查
# 在节点页面顶部显示当前节点的IP、位置、运营商等信息
# 使用ip-api.com的免费API获取节点信息
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js

# 资源解析器
# 用于解析各种格式的订阅链接(SS/SSR/V2Ray/Trojan等)
# 如果导入订阅报错，可能是解析器版本问题
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

# 跳过代理的路径(这些IP不经过QX处理)
# 239.x.x.x = 组播地址(局域网设备发现)
# 24.x.x.x = 美国有线电视网络
# 185.x.x.x = 某些CDN节点
# 192.168.x.x / 172.16.x.x / 10.x.x.x = 局域网私有地址
excluded_routes=239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32, 192.168.0.0/16, 172.16.0.0/12, 100.64.0.0/10, 10.0.0.0/8

# UDP Drop名单
# 443端口(HTTPS)的UDP数据包会被静默丢弃(不返回错误信息)
# 主要用于阻止QUIC协议(YouTube等用的)，避免分流异常
udp_drop_list=443

# 不支持UDP转发时的策略
# 当节点不支持UDP转发时，相关请求走direct(直连)
# 可选：direct(直连) / reject(拒绝)
fallback_udp_policy=direct

# DNS排除列表
# 这些域名不使用fake-ip模式，直接返回真实IP
# 主要是一些金融类APP(平安、招商)和运营商相关域名
# fake-ip模式：QX给域名分配一个假IP，先拦截请求再解析真实IP
# 排除的原因：这些APP对IP变化敏感，fake-ip会导致异常
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.lan, *.direct, *.msftconnecttest.com, *.msftncsi.com

# ICMP自动回复
# 当QX收到ping请求时自动回复，避免局域网内其他设备ping不通
icmp_auto_reply=true

# WiFi自动切换模式(可选功能)
# 根据连接的WiFi名称自动切换直连/代理模式
# 用法：取消下方#号，把WiFi名1和WiFi名2改成你实际的WiFi名
# WiFi名1: 连接这个WiFi时走直连(比如家里已有翻墙路由器)
# WiFi名2: 连接这个WiFi时走全局代理
# running_mode_trigger=filter, filter, WiFi名1:all_direct, WiFi名2:all_proxy


# =====================================
# [dns] DNS服务器设置
# =====================================
# DNS = 域名解析系统，把网址(如google.com)翻译成IP地址
# 配置多个DNS服务器可以并发查询，选最快的返回结果
# 国内DNS解析国内域名快，但无法解析被污染的国外域名
# QX会自动判断：国内域名走国内DNS，国外域名走代理节点的DNS
# =====================================
[dns]

# 禁用IPv6解析
# 大部分代理节点不支持IPv6，开启可能导致连接异常
no-ipv6

# DNS over HTTP/3(更快更安全的DNS查询)
prefer-doh3

# ===== 主DNS服务器(并发查询，选最快结果) =====
# 阿里DNS(国内最稳定)
server=223.5.5.5
# 腾讯DNSPod(国内常用)
server=119.29.29.29
# 114DNS(国内老牌)
server=114.114.114.114
# 中国移动DNS
server=202.141.176.93
# 中国移动DNS备份
server=202.141.178.13
# OneDNS(去广告)
server=117.50.10.10

# ===== 指定域名使用特定DNS解析 =====
# 格式：server=/域名关键词/DNS服务器
# 用途：国内大厂域名用国内DNS解析更快，避免绕远路

# Google安卓推送服务(国内需要指定IP才能收到推送)
address=/mtalk.google.com/108.177.125.188

# Google下载服务(用腾讯DNS解析，国内下载更快)
server=/dl.google.com/119.29.29.29
server=/dl.l.google.com/119.29.29.29
server=/update.googleapis.com/119.29.29.29

# PlayStation游戏下载(用腾讯DNS)
server=/*.dl.playstation.net/119.29.29.29

# 淘宝/天猫/支付宝/阿里云CDN(用阿里DNS，最匹配)
server=/*.taobao.com/223.5.5.5
server=/*.tmall.com/223.5.5.5
server=/*.alipay.com/223.5.5.5
server=/*.alicdn.com/223.5.5.5
server=/*.aliyun.com/223.5.5.5

# 京东/QQ/腾讯/微信(用腾讯DNS)
server=/*.jd.com/119.28.28.28
server=/*.qq.com/119.28.28.28
server=/*.tencent.com/119.28.28.28
server=/*.weixin.com/119.28.28.28

# B站(用腾讯DNS，视频加载更快)
server=/*.bilibili.com/119.29.29.29
server=/hdslb.com/119.29.29.29

# 网易(网易云音乐、网易游戏等)
server=/*.163.com/119.29.29.29
server=/*.126.com/119.29.29.29
server=/*.126.net/119.29.29.29
server=/*.127.net/119.29.29.29
server=/*.netease.com/119.29.29.29

# 小米/红米设备
server=/*.mi.com/119.29.29.29
server=/*.xiaomi.com/119.29.29.29

# 苹果服务(App Store、iCloud等，用腾讯DNS)
server=/aaplimg.com/119.29.29.29
server=/apple.com/119.29.29.29
server=/apple.com.cn/119.29.29.29
server=/apple-cloudkit.com/119.29.29.29
server=/apple-mapkit.com/119.29.29.29
server=/cdn-apple.com/119.29.29.29
server=/icloud.com/119.29.29.29
server=/icloud.com.cn/119.29.29.29

# 液滴网络(某些代理服务商会用)
server=/liquidlink.cn/119.29.29.29

# ===== DNS防污染(DNS circumvent) =====
# 当多个DNS并发查询时，如果最快返回的结果命中了下面的IP列表
# QX会等待其他DNS的响应，避免返回被污染的假IP
# 如果所有DNS都返回了这些IP，才认为查询失败
# 这些IP是中国大陆被DNS污染后常见的假IP
circumvent-ipv4-answer = 127.0.0.1, 0.0.0.0, 61.160.148.90, 182.43.124.6, 124.236.16.201, 39.102.194.95, 36.135.17.248, 36.135.82.110, 39.105.1.17, 39.130.181.72, 39.130.181.73, 39.173.74.185, 47.92.198.202, 111.22.226.1, 111.28.0.32, 111.31.192.110, 111.44.246.131, 111.56.127.216, 111.63.132.170, 112.15.232.43, 112.17.14.211, 112.54.50.50, 117.156.25.11, 117.187.10.42, 120.202.17.103, 120.209.204.204, 120.222.19.204, 121.4.135.105, 183.203.36.19, 183.207.72.18, 183.213.92.2, 183.220.145.129, 183.252.183.9, 211.137.133.69, 211.138.218.190, 211.139.25.61, 211.139.145.129, 218.201.25.129, 218.201.25.130, 218.203.122.98, 221.130.39.3
circumvent-ipv6-answer = ::


# =====================================
# [policy] 策略组
# =====================================
# 策略组决定了流量"走哪条路"
#
# 策略组类型说明：
# static       = 手动选择(你自己选节点，不会自动切换)
# url-latency-benchmark = 自动测速(自动选延迟最低的节点，推荐)
# available    = 按顺序选第一个可用节点
# round-robin  = 轮流使用(每次请求换一个节点)
# dest-hash    = 随机负载均衡(同一域名固定走一个节点)
#
# 流量走向：分流规则 → 策略组 → 节点/直连/拒绝
#
# 国家节点策略组使用自动测速，每600秒(10分钟)测一次
# tolerance=0 表示延迟相同也不切换(减少频繁跳节点)
# =====================================
[policy]

# ==========================================
# 国家/地区节点策略组(自动测速，推荐)
# ==========================================
# server-tag-regex = 正则表达式，根据节点名称匹配分组
# 例如节点名包含"香港"或"HK"就会归入"香港节点"组
# ^((?!(台|日|韩|新|美)).)*$ = 排除其他地区，避免重复匹配

# 香港节点 - 匹配名称中含"港/HK/Hong"的节点
url-latency-benchmark=香港节点, server-tag-regex=(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|美)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png

# 台湾节点 - 匹配名称中含"台/TW/Taiwan"的节点
url-latency-benchmark=台湾节点, server-tag-regex=(?=.*(台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png

# 日本节点 - 匹配名称中含"日/JP/Japan"的节点
url-latency-benchmark=日本节点, server-tag-regex=(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png

# 韩国节点 - 匹配名称中含"韩/KR/Korea"的节点
url-latency-benchmark=韩国节点, server-tag-regex=(?=.*(韩|KR|(?i)Korea))^((?!(港|台|日|新|美)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png

# 狮城节点(新加坡) - 匹配名称中含"SG/新加坡/Singapore"的节点
url-latency-benchmark=狮城节点, server-tag-regex=(?=.*(SG|新加坡|Singapore|(?i)sg))^((?!(港|台|日|韩|美)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png

# 美国节点 - 匹配名称中含"美/US/States/American"的节点
url-latency-benchmark=美国节点, server-tag-regex=(?=.*(美|US|(?i)States|American))^((?!(港|台|日|韩|新)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png

# 印度节点 - 匹配名称中含印度/India/IN的节点
url-latency-benchmark=印度节点, server-tag-regex=(?=.*(印度|India|(?i)IN))^((?!(港|台|日|韩|新|美|德|英|加)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/India.png

# 加拿大节点 - 匹配名称中含加拿大/Canada/CA的节点
url-latency-benchmark=加拿大节点, server-tag-regex=(?=.*(加拿大|Canada|(?i)CA))^((?!(港|台|日|韩|新|美|德|英|印)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Canada.png

# 德国节点 - 匹配名称中含德国/Germany/DE的节点
url-latency-benchmark=德国节点, server-tag-regex=(?=.*(德国|Germany|(?i)DE))^((?!(港|台|日|韩|新|美|印|英|加)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Germany.png

# 英国节点 - 匹配名称中含英国/UK/England/GB的节点
url-latency-benchmark=英国节点, server-tag-regex=(?=.*(英国|UK|England|(?i)GB))^((?!(港|台|日|韩|新|美|德|印|加)).)*$, check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_Kingdom.png

# 其他地区 - 不匹配任何上述地区的节点(比如一些特殊用途节点)
url-latency-benchmark=其他地区, server-tag-regex=^(?!.*(港|台|日|韩|新|美|印度|加拿大|德国|英国|HK|US|TW|JP|KR|SG|India|Canada|Germany|UK)), check-interval=600, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Static.png

# ==========================================
# 手动选择(所有节点，可手动指定任意节点)
# ==========================================
# 包含机场所有节点，长按功能策略组后选择此项，再长按此策略组选择具体节点
static=手动选择, server-tag-regex=., img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Quantumult_X.png


# ==========================================
# 功能策略组(按用途分组)
# ==========================================
# 每个策略组包含多个备选方案，排在前面的优先级更高
# 你可以手动切换策略组来选择走哪个节点

# 最快节点 - 自动测速选最快节点(排除网易云专用节点)
url-latency-benchmark=最快节点, server-tag-regex=^(?!.*网易云), check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png

# 最快节点 - 兜底时优先使用(不确定用什么就选这个)
# 优先走最快节点，不行就走美国、香港等

# YouTube - 视频流媒体(香港/台湾看B站番剧，美国看其他)
static=YouTube, 手动选择, 香港节点, 台湾节点, 美国节点, 日本节点, 韩国节点, 狮城节点, 其他地区, 印度节点, 加拿大节点, 德国节点, 英国节点, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png

