# =====================================
# [mitm] 中间人攻击证书
# =====================================
# MITM = Man-In-The-Middle，中间人攻击
# QX通过这个证书解密HTTPS加密流量，才能：
# - 去除APP广告(需要修改APP的网络请求)
# - 注入脚本(比如解锁会员功能)
# - 重写请求(比如修改服务器返回的数据)
#
# passphrase = 证书密码(在QX中生成证书时设置的)
# p12 = 证书文件(Base64编码，包含公钥和私钥)
# skip_validating_cert = true 表示跳过证书验证(推荐开启)
# hostname = 需要解密的域名(只解密这些域名的HTTPS)
#
# ⚠️ 重要：这个证书是Auto.conf自带的，如果你之前用过Auto.conf
#    并且已经在手机上安装并信任了这个证书，直接导入就能用
#    如果是新设备，需要在QX中重新生成证书
# =====================================
[mitm]
passphrase = C1001E22
p12 = 
skip_validating_cert = true
hostname = www.google.cn
