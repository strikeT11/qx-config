# 电报消息 - Telegram(狮城节点延迟低，优先)
static=电报消息, 手动选择, 狮城节点, 其他地区, 印度节点, 加拿大节点, 德国节点, 英国节点, 香港节点, 台湾节点, 日本节点, 韩国节点, 美国节点, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png

# Spotify - 音乐流媒体(美国区曲库最全)
static=Spotify, 手动选择, 美国节点, 香港节点, 台湾节点, 日本节点, 韩国节点, 狮城节点, 其他地区, 印度节点, 加拿大节点, 德国节点, 英国节点, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Spotify.png

